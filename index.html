<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEITU | Premium</title>
    
    <!-- Подключаем шрифты: Cinzel для логотипа (готика/люкс) и Roboto Mono для брутального текста -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --grey: #555555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Roboto Mono', monospace;
            text-transform: uppercase;
            -webkit-font-smoothing: antialiased;
        }

        /* Навигация */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 10px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--grey);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.3s;
        }

        nav button.active, nav button:hover {
            color: var(--fg);
        }

        /* Журнальная сетка */
        .container {
            padding: 40px;
        }

        .grid {
            display: grid;
            /* Крупные карточки для вайба Chrome Hearts */
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 40px;
        }

        .product-card {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid transparent;
            transition: border 0.3s;
        }

        .product-card:hover {
            border: 1px solid #333;
        }

        .product-image {
            width: 100%;
            height: 650px;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
            transition: filter 0.5s, transform 0.7s ease;
        }

        .product-card:hover .product-image {
            filter: grayscale(0%) contrast(120%);
            transform: scale(1.02);
        }

        /* Информация о товаре появляется поверх фото внизу */
        .product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .product-details h3 {
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .product-details p {
            color: var(--grey);
            font-size: 0.85rem;
        }

        /* Брутальная кнопка покупки */
        .btn-buy {
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--fg);
            padding: 12px 25px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 1px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .product-card:hover .btn-buy {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-buy:hover {
            background: var(--fg);
            color: var(--bg);
        }

        .hidden {
            display: none;
        }

        /* Адаптив для телефонов */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .product-image {
                height: 500px;
            }
            .btn-buy {
                opacity: 1; /* На телефоне кнопка видна всегда */
                transform: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZEITU</div>
        <nav>
            <button id="btn-men" class="active" onclick="switchCategory('men')">Menswear</button>
            <button id="btn-women" onclick="switchCategory('women')">Womenswear</button>
        </nav>
    </header>

    <div class="container">
        
        <!-- MENSWEAR -->
        <div id="men-section">
            <div class="grid">
                <div class="product-card">
                    <!-- Заменил фото на более мрачные/стильные -->
                    <img src="https://images.unsplash.com/photo-1550246140-5119ae4790b8?auto=format&fit=crop&w=800&q=80" alt="Leather Jacket" class="product-image">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>Heavy Leather Jacket</h3>
                            <p>USD 1,200</p>
                        </div>
                        <button class="btn-buy">Purchase</button>
                    </div>
                </div>
                
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1509539662397-116cb90542f1?auto=format&fit=crop&w=800&q=80" alt="Black Hoodie" class="product-image">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>Oversized Void Hoodie</h3>
                            <p>USD 350</p>
                        </div>
                        <button class="btn-buy">Purchase</button>
                    </div>
                </div>

                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1594938298603-c8148c4dae35?auto=format&fit=crop&w=800&q=80" alt="Cargo Pants" class="product-image">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>Tactical Denim</h3>
                            <p>USD 480</p>
                        </div>
                        <button class="btn-buy">Purchase</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- WOMENSWEAR -->
        <div id="women-section" class="hidden">
            <div class="grid">
                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1617019114594-54afef31d558?auto=format&fit=crop&w=800&q=80" alt="Dark Dress" class="product-image">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>Silk Noir Dress</h3>
                            <p>USD 890</p>
                        </div>
                        <button class="btn-buy">Purchase</button>
                    </div>
                </div>

                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1554412933-514a83d2f3c8?auto=format&fit=crop&w=800&q=80" alt="Corset" class="product-image">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>Structured Corset Top</h3>
                            <p>USD 420</p>
                        </div>
                        <button class="btn-buy">Purchase</button>
                    </div>
                </div>

                <div class="product-card">
                    <img src="https://images.unsplash.com/photo-1588117305388-c2631a279f82?auto=format&fit=crop&w=800&q=80" alt="Boots" class="product-image">
                    <div class="product-info">
                        <div class="product-details">
                            <h3>Combat Leather Boots</h3>
                            <p>USD 950</p>
                        </div>
                        <button class="btn-buy">Purchase</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function switchCategory(category) {
            document.getElementById('btn-men').classList.remove('active');
            document.getElementById('btn-women').classList.remove('active');
            
            // Плавное скрытие
            document.getElementById('men-section').style.opacity = '0';
            document.getElementById('women-section').style.opacity = '0';

            setTimeout(() => {
                document.getElementById('men-section').classList.add('hidden');
                document.getElementById('women-section').classList.add('hidden');

                document.getElementById('btn-' + category).classList.add('active');
                document.getElementById(category + '-section').classList.remove('hidden');
                
                // Плавное появление
                setTimeout(() => {
                    document.getElementById(category + '-section').style.opacity = '1';
                    document.getElementById(category + '-section').style.transition = 'opacity 0.4s ease';
                }, 50);
            }, 200); // Небольшая задержка для эффекта
        }
    </script>
</body>
</html>
